  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface-hover: #1e1e22;
    --border: #2a2a2f;
    --border-hover: #3d3d45;
    --text: #e8e8ed;
    --text-muted: #6b6b78;
    --text-dim: #4a4a54;
    --accent: #7c6af7;
    --accent-dim: #3d3660;
    --green: #3ecf8e;
    --green-dim: #1a4a37;
    --sidebar-w: 260px;
    --header-h: 56px;
  }

  html { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    display: flex;
    flex-direction: column;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.01em;
    color: var(--text);
    flex-shrink: 0;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .stats-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .stat-item {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .stat-num {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    color: var(--text-muted);
    font-size: 12px;
  }

  .search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px 6px 32px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .device-badge {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid #4a42a0;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 16px 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.1s;
    border-left: 2px solid transparent;
    gap: 8px;
  }

  .nav-item:hover { background: var(--surface-hover); }

  .nav-item.active {
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }

  .nav-item.active .nav-label { color: var(--text); }

  .nav-label {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .nav-root-path {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .nav-count {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .nav-item.active .nav-count {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Root Section ── */
  .root-section {
    margin-bottom: 40px;
  }

  .root-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .root-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    letter-spacing: -0.01em;
  }

  .root-count-badge {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 7px;
    border-radius: 10px;
  }

  .root-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Grid ── */
  .repo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  /* ── Card ── */
  .repo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: default;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .repo-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .repo-card:hover {
    border-color: var(--border-hover);
    background: var(--surface-hover);
    transform: translateY(-1px);
  }

  .repo-card:hover::before { opacity: 1; }

  .repo-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    letter-spacing: -0.01em;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .repo-path {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }

  .repo-path .path-root {
    color: var(--text-muted);
  }

  /* nested indicator */
  .nested-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .nested-badge::before {
    content: '↳';
    font-size: 10px;
  }

  /* hidden card (search) */
  .repo-card.hidden { display: none; }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-text { font-size: 14px; }

  /* ── Match highlight ── */
  .hl { color: var(--accent); background: var(--accent-dim); border-radius: 2px; padding: 0 1px; }

  /* ── No results ── */
  .no-results {
    display: none;
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
  }

  .no-results.show { display: block; }
</style>

(function () {
  const devices = DATA.data.devices;

  // Group by scanRoot
  const rootMap = new Map();
  for (const d of devices) {
    if (!rootMap.has(d.scanRoot)) rootMap.set(d.scanRoot, []);
    rootMap.get(d.scanRoot).push(d);
  }

  const roots = [...rootMap.keys()];
  const device = devices[0]?.device || 'unknown';

  // Update header
  document.getElementById('stat-roots').textContent = roots.length;
  document.getElementById('stat-repos').textContent = devices.length;
  document.getElementById('device-label').textContent = device;

  // Detect nested repos (path !== scanRoot + '/' + repo)
  function isNested(d) {
    const expected = d.scanRoot + '/' + d.repo;
    return d.path !== expected;
  }

  function getRelPath(d) {
    return d.path.replace(d.scanRoot + '/', '');
  }

  // Build sidebar nav
  const navList = document.getElementById('nav-list');
  roots.forEach((root, i) => {
    const count = rootMap.get(root).length;
    const shortRoot = root.replace('/Users/larysong/', '~/');
    const item = document.createElement('div');
    item.className = 'nav-item' + (i === 0 ? ' active' : '');
    item.dataset.root = root;
    item.innerHTML = `
      <span class="nav-root-path">${escHtml(shortRoot)}</span>
      <span class="nav-count">${count}</span>
    `;
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      const sec = document.getElementById('section-' + CSS.escape(root));
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    navList.appendChild(item);
  });

  // Build main content
  const content = document.getElementById('content');
  roots.forEach(root => {
    const repos = rootMap.get(root);
    const shortRoot = root.replace('/Users/larysong/', '~/');
    const section = document.createElement('div');
    section.className = 'root-section';
    section.id = 'section-' + root;

    const header = document.createElement('div');
    header.className = 'root-header';
    header.innerHTML = `
      <span class="root-title">${escHtml(shortRoot)}</span>
      <span class="root-count-badge">${repos.length}</span>
      <div class="root-line"></div>
    `;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'repo-grid';

    repos.forEach(d => {
      const nested = isNested(d);
      const relPath = getRelPath(d);
      const card = document.createElement('div');
      card.className = 'repo-card';
      card.dataset.repo = d.repo.toLowerCase();
      card.dataset.path = d.path.toLowerCase();

      let pathHtml = '';
      if (nested) {
        const parts = relPath.split('/');
        const dirs = parts.slice(0, -1).join('/');
        pathHtml = `<div class="repo-path"><span class="path-root">${escHtml(dirs)}/</span>${escHtml(parts[parts.length - 1])}</div>`;
      } else {
        pathHtml = `<div class="repo-path">${escHtml(relPath)}</div>`;
      }

      card.innerHTML = `
        <div class="repo-name">${escHtml(d.repo)}</div>
        ${pathHtml}
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    content.appendChild(section);
  });

  // Search
  const searchInput = document.getElementById('search');
  const statFilteredWrap = document.getElementById('stat-filtered-wrap');
  const statFiltered = document.getElementById('stat-filtered');
  const noResults = document.getElementById('no-results');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) {
      document.querySelectorAll('.repo-card').forEach(c => c.classList.remove('hidden'));
      document.querySelectorAll('.root-section').forEach(s => s.style.display = '');
      statFilteredWrap.style.display = 'none';
      noResults.classList.remove('show');
      return;
    }

    let total = 0;
    document.querySelectorAll('.root-section').forEach(section => {
      let sectionVisible = 0;
      section.querySelectorAll('.repo-card').forEach(card => {
        const name = card.dataset.repo || '';
        const path = card.dataset.path || '';
        const match = name.includes(q) || path.includes(q);
        card.classList.toggle('hidden', !match);
        if (match) sectionVisible++;
      });
      section.style.display = sectionVisible === 0 ? 'none' : '';
      total += sectionVisible;
    });

    statFiltered.textContent = total;
    statFilteredWrap.style.display = '';
    noResults.classList.toggle('show', total === 0);
  });

  // Keyboard shortcut: / to focus search
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
    }
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchInput.dispatchEvent(new Event('input'));
      searchInput.blur();
    }
  });

  // IntersectionObserver: highlight active nav on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.1) {
        const root = entry.target.id.replace('section-', '');
        document.querySelectorAll('.nav-item').forEach(el => {
          el.classList.toggle('active', el.dataset.root === root);
        });
      }
    });
  }, { threshold: 0.1, rootMargin: '-56px 0px -60% 0px' });

  document.querySelectorAll('.root-section').forEach(s => observer.observe(s));

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
